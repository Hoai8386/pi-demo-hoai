<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Demo App - Nông Sản Xuất Nhập Khẩu</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: #f0f8ff; 
        }
        h1 { color: #4CAF50; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Xin chào Pi Network! 🎉</h1>
    <h2>App của em đã live rồi</h2>
    <p><strong>Domain verified:</strong> nong-sanxuatkhau8255.pi</p>
    <p>Nhấn nút dưới để test thanh toán 1 Pi (demo)</p>
    
    <button onclick="testPayment()">Thanh toán demo 1 Pi</button>

    <script>
        // ==================== KHỞI TẠO SDK (BẮT BUỘC) ====================
        Pi.init({ version: "2.0" });   // ← Dòng này rất quan trọng!

        // Xử lý thanh toán cũ chưa hoàn tất
        function onIncompletePaymentFound(payment) {
            console.log("🔄 Phát hiện thanh toán cũ:", payment);
            if (!payment?.identifier) return;
        }

        // Hàm thanh toán demo
        async function testPayment() {
            try {
                await Pi.createPayment(
                    {
                        amount: 1,
                        memo: "Test thanh toán từ app demo",
                        metadata: { appName: "Nông Sản Xuất Nhập Khẩu" }
                    },
                    {
                        onReadyForServerApproval: (paymentId) => {
                            console.log("📌 Ready for approval:", paymentId);
                        },

                        onReadyForServerCompletion: (paymentId, txid) => {
                            console.log("✅ Thanh toán hoàn tất! TxID:", txid);
                            alert(`🎉 Thanh toán thành công!\n\nTxID: ${txid}`);
                        },

                        onCancel: () => {
                            alert("🚫 Thanh toán đã bị hủy.");
                        },

                        onError: (error) => {
                            console.error("❌ Lỗi:", error);
                            alert("Lỗi thanh toán: " + (error.message || "Không xác định"));
                        }
                    }
                );
            } catch (err) {
                console.error("❌ Lỗi createPayment:", err);
                alert("Lỗi khởi tạo: " + (err.message || "Không xác định"));
            }
        }// Đăng nhập Pi
        Pi.authenticate(['payments'], onIncompletePaymentFound)
            .then(auth => {
                console.log("✅ Đăng nhập Pi thành công:", auth.user?.username || "Unknown");
            })
            .catch(err => {
                console.error("❌ Lỗi đăng nhập:", err);
                alert("Lỗi đăng nhập Pi: " + (err.message || "Không xác định"));
            });
    </script>
</body>
</html>
