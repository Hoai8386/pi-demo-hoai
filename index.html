<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Demo - Hoài</title>
    
    <!-- Font Awesome (nếu cần icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --dark: #0f172a;
            --gray: #1e2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--gray);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #0ea5e9, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .demo-content {
            margin: 30px 0;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid #334155;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 Pi Demo</h1>
        <p>Ứng dụng demo đơn giản - Chào mừng bạn!</p>

        <div class="demo-content">
            <h2 id="message">Nhấn nút bên dưới để thử nghiệm</h2>
        </div>

        <button onclick="showMessage()">
            <i class="fas fa-magic"></i> Thử ngay
        </button>

        <button onclick="resetMessage()">
            <i class="fas fa-undo"></i> Reset
        </button>
    </div>

    <div class="footer">
        Made with ❤️ by Hoài • GitHub: hoai3305
    </div>
