<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Nông Sản - Pi Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(to bottom, #f0fdf4, #ecfdf5);
            color: #166534;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            max-width: 460px;
            margin: 40px auto;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 9999px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
        .success { color: #16a34a; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌾 CNS Nông Sản</h1>
        <p style="margin: 20px 0; font-size: 1.2rem;">Thanh toán demo 1 Pi</p>
        
        <button class="button" onclick="demoPayment()">Thanh Toán Bằng Pi</button>
    </div>

    <script>
        function demoPayment() {
            const btn = event.target;
            const originalText = btn.textContent;

            btn.style.background = '#86efac';
            btn.textContent = 'Đang xử lý...';
            btn.disabled = true;

            setTimeout(() => {
                alert(`✅ Thanh toán thành công!\n\nSố tiền: 1 π\nTransaction ID: #PI${Date.now()}\n\nCảm ơn bạn đã test CNS App!`);

                btn.style.background = '#22c55e';
                btn.textContent = originalText;
                btn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
