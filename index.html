<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Network - CNS Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #f0fdf4, #ecfdf5);
            color: #166534;
            min-height: 100vh;
            padding: 20px 16px;
            text-align: center;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.65rem;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #15803d;
        }

        .success {
            font-size: 1.1rem;
            margin: 24px 0;
            line-height: 1.5;
        }

        .highlight {
            color: #166534;
            font-weight: 700;
        }

        .description {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
            font-size: 1.02rem;
            line-height: 1.6;
            border: 1px solid #86efac;
        }

        .button {
            background: #4ade80;
            color: #14532d;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            margin: 20px auto;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
            transition: all 0.3s;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 222, 128, 0.5);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #4b7c5f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Xin chào Pi Network! App<br>
            của em đã live rồi 👋
        </h1>

        <p class="success">
            Domain đã verified thành công! <strong>Subdomain PiNet:</strong><br>
            <span class="highlight">nong-sanxuatkhau8255.pi</span>
        </p>

        <div class="description">
            Đây là trang demo đơn giản để test trong Pi Browser.<br><br>
            Nhấn nút dưới để test thanh toán <strong>1 Pi</strong> (demo - miễn phí Testnet):
        </div>

        <button class="button" onclick="payDemo()">
            Thanh toán demo 1 Pi
        </button>

        <div class="footer">
            Made with ❤️ by Hoài • Testnet Mode
        </div>
    </div>

    <script>
        function payDemo() {
            const btn = document.querySelector('.button');
            const originalText = btn.textContent;btn.style.background = '#86efac';
            btn.textContent = 'Đang xử lý...';

            setTimeout(() => {
                alert("✅ Thanh toán thành công!\n\nBạn đã thanh toán 1 π (Testnet)\nTransaction ID: #PI20260511DEMO001");
                
                btn.style.background = '#4ade80';
                btn.textContent = originalText;
            }, 1600);
        }
    </script>
</body>
</html>
