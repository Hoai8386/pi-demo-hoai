<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Demo App - Công ty Xuất Nhập Khẩu Nông Sản</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
  <body>
    <h1>Xin chào Pi Network! App của em đã live rồi 🎉</h1>
    <p>Domain đã verified thành công! <span class="highlight">Subdomain PiNet</span></p>
    <p>Đây là trang demo đơn giản để test trong Pi Browser.</p>
    <p>Nhấn nút dưới để test thanh toán <span class="highlight">1 Pi (demo - miễn phí Testnet)</span></p>
    
    <button onclick="testPayment()">Thanh toán demo 1 Pi</button>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <script>
        // Khởi tạo Pi SDK
        Pi.init({ 
            version: "2.0", 
            sandbox: true 
        }).then(() => {
            console.log("✅ Pi SDK init thành công");

            // Xác thực người dùng
            Pi.authenticate(['payments', 'username'], {
                onIncompletePaymentFound: (payment) => {
                    console.log("Có payment dang dở:", payment.paymentId);
                    return payment;
                }
            }).then(auth => {
                console.log("Login Pi thành công!", auth.user);
                // alert("Đã login Pi: " + auth.user.username);
            }).catch(err => {
                console.error("Lỗi authenticate:", err);
            });

        }).catch(err => {
            console.error("Lỗi Pi.init:", err);
        });

        // Hàm thanh toán
        function testPayment() {
            const paymentData = {
                amount: 1,
                memo: "Test thanh toán demo 1 Pi",
                metadata: { type: "demo", item: "test_payment" }
            };

            const callbacks = {
                onReadyForServerApproval: (paymentId) => {
                    console.log("✅ Payment ready for approval:", paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    console.log("✅ Thanh toán thành công! TxID:", txid);
                    alert("✅ Thanh toán thành công!\nTxID: " + txid);
                },
                onCancel: (paymentId) => {
                    alert("Bạn đã hủy thanh toán.");
                },
                onError: (error) => {
                    console.error("Payment error:", error);
                    alert("Lỗi thanh toán: " + (error.message || error));
                }
            };

            Pi.createPayment(paymentData, callbacks);
        }
    </script>
</body>
</html>
