<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Network - CNS Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, #f0fdf4, #ecfdf5);
            color: #166534;
            min-height: 100vh;
            padding: 20px 16px;
            text-align: center;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.65rem;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #15803d;
        }

        .success {
            font-size: 1.1rem;
            margin: 24px 0;
            line-height: 1.5;
        }

        .highlight {
            color: #166534;
            font-weight: 700;
        }

        .description {
            background: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
            font-size: 1.02rem;
            line-height: 1.6;
            border: 1px solid #86efac;
        }

        .button {
            background: #4ade80;
            color: #14532d;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            margin: 20px auto;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Xin chào Pi Network! App<br>
            của em đã live rồi 👋
        </h1>

        <p class="success">
            Domain đã verified thành công!<br>
            <strong>Subdomain PiNet:</strong> nong-sanxuatkhau8255.pi
        </p>

        <div class="description">
            Đây là trang demo đơn giản để test trong Pi Browser.<br><br>
            Nhấn nút dưới để test thanh toán <strong>1 Pi</strong> (demo - miễn phí Testnet):
        </div>

        <button class="button" id="payButton" onclick="payWithPi()">
            Thanh toán demo 1 Pi
        </button>

        <div style="margin-top: 40px; font-size: 0.9rem; color: #4b7c5f;">
            Made with ❤️ by Hoài • Testnet Mode
        </div>
    </div>

    <!-- === PI SDK === -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Khởi tạo Pi SDK
        async function initPi() {
            try {
                await Pi.init({
                    version: "2.0",      // Phiên bản hiện tại
                    sandbox: true        // Dùng true khi test (Testnet)
                });console.log("✅ Pi SDK đã khởi tạo thành công");
            } catch (error) {
                console.error("❌ Pi SDK init lỗi:", error);
            }
        }

        // Hàm thanh toán thật bằng Pi SDK
        async function payWithPi() {
            const btn = document.getElementById('payButton');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = "Đang xử lý...";

            try {
                // Yêu cầu xác thực người dùng (nếu chưa)
                const user = await Pi.authenticate(['username', 'payments']);

                // Tạo thanh toán
                const payment = await Pi.createPayment({
                    amount: 1,                    // 1 Pi
                    memo: "Mua 1kg Nông Sản Test - Demo",
                    metadata: {
                        product: "NongSanTest",
                        quantity: 1,
                        type: "demo"
                    }
                });

                alert(`✅ Thanh toán thành công!\n\nSố tiền: 1 π\nTransaction ID: ${payment.identifier || 'DEMO_SUCCESS'}`);
                
            } catch (error) {
                console.error(error);
                alert("❌ Thanh toán bị hủy hoặc có lỗi.\n\n" + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // Khởi chạy SDK khi trang load
        window.onload = initPi;
    </script>
</body>
</html>
