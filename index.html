<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Demo App - Nông Sản Xuất Nhập Khẩu</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f8ff;
        }
        h1 { color: #4CAF50; }
        button {

<body>
    <h1>Xin chào Pi Network! 🎉</h1>
    <h2>App của em đã live rồi</h2>
    <p><strong>Domain verified:</strong> nong-sanxuatkhau8255.pi</p>
    <p>Nhấn nút dưới để test thanh toán 1 Pi (demo)</p>
    
    <button onclick="testPayment()">Thanh toán demo 1 Pi</button>

    <script>
        // ====================== PI PAYMENT SDK ======================
        
        // Xử lý thanh toán cũ chưa hoàn tất (BẮT BUỘC)
        function onIncompletePaymentFound(payment) {
            console.log("🔄 Phát hiện thanh toán cũ chưa hoàn tất:", payment);

            if (!payment || !payment.identifier) return;

            const paymentId = payment.identifier;
            const txid = payment.transaction?.txid || null;

            // Gọi backend để hoàn tất thanh toán cũ
            fetch('/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    paymentId, 
                    txid, 
                    type: 'incomplete' 
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('Backend lỗi');
                return res.json();
            })
            .then(data => console.log('✅ Hoàn tất thanh toán cũ thành công:', data))
            .catch(err => console.error('❌ Lỗi xử lý thanh toán cũ:', err));
        }

        // Hàm thanh toán demo 1 Pi
        async function testPayment() {
            try {
                await Pi.createPayment(
                    {
                        amount: 1,
                        memo: "Test thanh toán từ app demo",
                        metadata: { 
                            appName: "Nông Sản Xuất Nhập Khẩu" 
                        }
                    },
                    {
                        // Khi Pi yêu cầu server approve
                        onReadyForServerApproval: (paymentId) => {
                            console.log("📌 Ready for approval:", paymentId);
