<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Pi Demo</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0fdf4;
            color: #166534;
            text-align: center;
            padding: 50px 20px;
        }
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌾 CNS Nông Sản</h1>
        <p style="margin: 25px 0; font-size: 1.15rem;">
            Test Thanh Toán <strong>1 Pi</strong>
        </p>
        <button onclick="makePayment()">Thanh Toán Bằng Pi</button>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        async function makePayment() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = "Đang xử lý...";

            try {
                await Pi.init({ 
                    version: "2.0", 
                    sandbox: true 
                });

                await Pi.authenticate(['payments']);

                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Demo 1 Pi - CNS App",
                    metadata: { test: true }
                });

                alert("✅ Thanh toán thành công!\n\nĐây là demo test.");

            } catch (err) {
                console.error(err);
                alert("❌ Lỗi: " + (err.message || "Không xác định"));
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Thanh Toán Bằng Pi";
            }
        }
    </script>
</body>
</html>
