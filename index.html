<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Pi Demo App - Nông Sản Xuất Khẩu</title>
    
    <!-- Nhúng Pi SDK chuẩn (BẮT BUỘC) -->
    <script src="https://sdk.minepi.com"></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f0f8ff; }
        h1 { color: #4CAF50; }
        p { font-size: 18px; color: #333; }
        .btn-pay { 
            padding: 15px 30px; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-pay:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h1>Xin chào Pi Network!</h1>
    <p>Tên miền phụ PiNet: <strong>nong-sanxuatkhau8255.pi</strong></p>
    <p>Ứng dụng của em đã tồn tại và sẵn sàng tích hợp SDK.</p>
    
    <button class="btn-pay" onclick="createPayment()">THANH TOÁN THỬ NGHIỆM</button>

    <script>
        // 1. Khởi tạo Pi SDK (Sửa lỗi "not initialized")
        Pi.init({ version: "2.0", sandbox: false });

        // 2. Xác thực người dùng khi vào trang
        Pi.authenticate(['payments', 'username'], onIncompletePaymentFound)
        .then(function(auth) {
            console.log("Đăng nhập thành công: " + auth.user.username);
        }).catch(function(error) {
            console.error(error);
        });

        // 3. Hàm tạo thanh toán
        function createPayment() {
            const paymentData = {
                amount: 1.0, 
                memo: "Thanh toán đơn hàng nông sản", 
                metadata: { orderId: 123 }
            };

            Pi.createPayment(paymentData, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Chờ Server phê duyệt ID:", paymentId);
                    // Gửi paymentId lên server của bạn tại đây
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Giao dịch hoàn tất! TxID:", txid);
                    alert("Thanh toán thành công! TxID: " + txid);
                },
                onCancel: function(paymentId) { console.log("Đã hủy thanh toán"); },
                onError: function(error, paymentId) { console.error("Lỗi:", error); }
            });
        }

        // 4. Xử lý giao dịch chưa hoàn tất
        function onIncompletePaymentFound(payment) {
            console.log("Phát hiện giao dịch chưa hoàn tất:", payment);
        };
    </script>

</body>
</html>
