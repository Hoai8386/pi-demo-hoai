<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS - Nông Sản Việt Nam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, #f0fdf4, #ecfdf5);
            color: #166534;
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 1.7rem; margin-bottom: 12px; color: #15803d; }
        .subtitle { color: #4b7c5f; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .button {
            background: #4ade80;
            color: #14532d;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 9999px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .button:disabled { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Công ty Xuất Nhập Khẩu Nông Sản</h1>
        <p class="subtitle">Kết nối nông dân - Người tiêu dùng qua Pi Network</p>

        <div class="card">
            <h2>Thanh Toán Demo</h2>
            <p style="margin: 16px 0; font-size: 1.1rem;"><strong>1 Pi</strong> - Mua 1kg Nông Sản Test</p>
            <button class="button" id="payButton" onclick="payWithPi()">
                Thanh Toán Bằng Pi
            </button>
        </div>

        <p style="text-align: center; margin-top: 30px; font-size: 0.95rem;">
            <a href="privacy-policy.html" style="color:#15803d;">Privacy Policy</a> | 
            <a href="terms.html" style="color:#15803d;">Terms of Service</a>
        </p>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        async function initPi() {
            try {
                await Pi.init({ version: "2.0", sandbox: true }); // Đổi thành false khi Mainnet
            } catch (e) { console.error(e); }
        }

        async function payWithPi() {
            const btn = document.getElementById('payButton');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Đang xử lý...";

            try {
                await Pi.authenticate(['username', 'payments']);

                const paymentData = {
                    amount: 1,
                    memo: "Mua 1kg Nông Sản Test - CNS App",
                    metadata: {
                        app: "CNS-NongSan",
                        product: "TestProduct",
                        timestamp: Date.now()
                    }};

                const callbacks = {
                    onReadyForServerApproval: async (paymentId) => {
                        await fetch('/api/payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: "approve", paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert(`✅ Thanh toán thành công!\n\nTransaction ID: ${txid || paymentId}`);
                    },
                    onCancel: () => alert("⚠️ Thanh toán đã bị hủy."),
                    onError: (error) => alert("❌ Lỗi thanh toán: " + error.message)
                };

                Pi.createPayment(paymentData, callbacks);

            } catch (error) {
                alert("Lỗi: " + (error.message || "Vui lòng thử lại"));
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        window.onload = initPi;
    </script>
</body>
</html>
