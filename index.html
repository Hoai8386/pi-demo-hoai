<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Nông Sản</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(#f0fdf4, #ecfdf5);
            color: #166534;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .card {
            background: white;
            max-width: 420px;
            margin: 0 auto;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌾 CNS Nông Sản</h1>
        <p style="margin: 25px 0; font-size: 1.2rem;">Thanh toán demo 1 Pi</p>
        <button onclick="makePayment()">Thanh Toán Bằng Pi</button>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        async function makePayment() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = "Đang xử lý...";

            try {
                await Pi.init({ version: "2.0", sandbox: true });

                await Pi.authenticate(['payments']);

                const paymentData = {
                    amount: 1,
                    memo: "Test Transaction - CNS Nông Sản",
                    metadata: { type: "verification", app: "cns-nongsan" }
                };

                const callbacks = {
                    onReadyForServerApproval: () => {},
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert(`✅ Giao dịch thành công!\n\nTransaction ID: ${txid || paymentId}\n\nBạn đã hoàn thành bước cuối cùng!`);
                    },
                    onCancel: () => alert("Thanh toán bị hủy."),
                    onError: (err) => alert("Lỗi: " + err.message)
                };

                Pi.createPayment(paymentData, callbacks);

            } catch (err) {
                alert("❌ Lỗi: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Thanh Toán Bằng Pi";
            }
        }
    </script>
</body>
</html>
