    Pi.authenticate(['payments'], onIncompletePaymentFound)

        console.log("Đã xin quyền payments thành công!");
      })
      .catch(err => {
        console.error("Lỗi xin quyền payments:", err);
        alert("Lỗi xin quyền payments: " + (err.message || err));
      });

    function onIncompletePaymentFound(payment) {
      console.log("Có payment dang dở:", payment.paymentId);
    }
