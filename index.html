    p { 
      font-size: 17px;

      color: #2e7d32;

    }

<body>
  <h1>Xin chào Pi Network! App của em đã live rồi 🤩</h1>
  <p>Domain đã verified thành công! <span class="highlight">Subdomain PiNet:</span> nong-sanxuatkhaau8255.pi</p>
  <p>Đây là trang demo đơn giản để test trong Pi Browser.</p>
  <p>Nhấn nút dưới để test thanh toán <span class="highlight">1 Pi (demo - miễn phí Testnet)</span>:</p>

  <button onclick="testPayment()">Thanh toán demo 1 Pi</button>

  <script>
// Đảm bảo Pi SDK đã load
const Pi = window.Pi;

// 1. Khởi tạo Pi SDK
Pi.init({ version: "2.0", sandbox: true });   // Dùng sandbox: true khi test

// 2. Xác thực người dùng + xin quyền payments
Pi.authenticate(['payments'], {
    onIncompletePaymentFound: (payment) => {
        console.log("Có payment dang dở:", payment.paymentId);
        return payment; // Hoặc xử lý tiếp
    }
}).then(auth => {
    console.log("Login Pi thành công!", auth.user);
    alert("Đã login Pi: " + auth.user.username);
}).catch(err => {
    console.error("Lỗi login:", err);
    alert("Lỗi login Pi: " + (err.message || err));
});

// === HÀM THANH TOÁN DEMO ===
function testPayment() {
    const paymentData = {
        amount: 1,                    // Số Pi demo (miễn phí trong sandbox)
        memo: "Test thanh toán demo 1 Pi",
        metadata: { 
            type: "demo",
            item: "test_payment"
        }
    };

    const paymentCallbacks = {
        onReadyForServerApproval: (paymentId) => {
            console.log("✅ Payment ready for approval:", paymentId);
            // Nếu bạn có backend, gọi API approve paymentId ở đây
        },
        onReadyForServerCompletion: (paymentId, txid) => {
            console.log("✅ Payment completed! TxID:", txid);
            alert("Thanh toán thành công! TxID: " + txid);
        },
        onCancel: (paymentId) => {
            console.log("❌ User cancelled payment:", paymentId);
            alert("Bạn đã hủy thanh toán.");
        },
        onError: (error, payment) => {
            console.error("❌ Payment error:", error);
            alert("Lỗi thanh toán: " + error.message);
        }
    };

    Pi.createPayment(paymentData, paymentCallbacks);
}
</script>
